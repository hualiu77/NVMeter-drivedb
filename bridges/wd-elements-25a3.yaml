bridge: "Western Digital internal USB-SATA bridge (Elements 25A3 family)"
vendor: "Western Digital"
usb_ids:
  - "1058:25a3"
smartctl_args: []
verified_by:
  - "@hualiu77"
notes: |
  WD Elements 12TB external HDD (USB 3.0, "Elements 25A3" / WDBWLG0120HBK
  family, AKA WDC WD120EDBZ shucked drive). Confirmed model string from
  IORegistry: "Elements 25A3" by Western Digital.

  macOS status: BLOCKED. On macOS 14+ / Apple Silicon, all of the
  following return either "Operation not supported by device" or
  "Not a device of type 'scsi'":
      smartctl -i /dev/diskN
      smartctl -d sat -i /dev/diskN
      smartctl -d sat,12 -i /dev/diskN
      smartctl -d sat,16 -i /dev/diskN
      smartctl -d usbjmicron -i /dev/diskN
      smartctl -d usbsunplus -i /dev/diskN
      smartctl -d usbcypress -i /dev/diskN
      smartctl -d usbasm1352r,0 -i /dev/diskN
      smartctl -d usbprolific -i /dev/diskN

  This appears to be a fundamental macOS limitation rather than a wrong
  -d argument: WD's bridge does not advertise an SAT pass-through interface
  that macOS's user-space SCSI driver can use. Reportedly works on Linux
  via the kernel SAT layer — Linux probe data welcome.

  Practical impact for NVMeter: detect this USB ID and surface a friendly
  "macOS cannot read SMART for this enclosure" message instead of a
  scary error. Recommend the user move the drive into an enclosure with
  a JMicron / ASMedia / Realtek bridge if SMART is required.
